# Full Python quality toolchain — per ~/.claude/rules/quality-toolchain-pre-merge.md
# Ruff (lint+format) + mypy (types) + bandit (security SAST) + pip-audit (deps).
# Modularity rules (PLR / C90 / radon) DEFERRED until repo refactor sprint per Sammy 2026-05-23.
name: lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality-stack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install quality stack
        run: |
          pip install --quiet \
            "ruff>=0.5" \
            "mypy>=1.10" \
            "bandit[toml]>=1.7" \
            "pip-audit>=2.7"

      - name: Ruff lint
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

      - name: Mypy type check
        run: mypy . --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # baseline mode — remove after type debt cleaned

      - name: Bandit security scan
        run: bandit -r . -c pyproject.toml -q || bandit -r . -q --skip B101,B404,B603

      - name: Pip-audit (dependency vulnerabilities)
        run: pip-audit --strict || true  # warn-only initially; tighten later
